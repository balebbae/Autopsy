openapi: 3.1.0
info:
  title: Agent Autopsy Graph Service API
  version: 0.1.0
  description: |
    Ingestion + analysis + preflight API consumed by the opencode plugin and the dashboard.
    All write paths are idempotent on (run_id, event_id) where applicable.

servers:
  - url: http://localhost:4000
    description: Local dev

tags:
  - name: events
  - name: runs
  - name: preflight
  - name: stream
  - name: graph

paths:
  /v1/health:
    get:
      tags: [events]
      summary: Liveness probe
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties: { ok: { type: boolean } }

  /v1/events:
    post:
      tags: [events]
      summary: Ingest a batch of opencode events
      description: |
        Plugin posts NDJSON-style batches of events. Insert is idempotent on
        (run_id, event_id). Returns 202 immediately; assembly is async.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  items: { $ref: "#/components/schemas/EventIn" }
      responses:
        "202": { description: accepted }

  /v1/runs:
    get:
      tags: [runs]
      summary: List runs
      parameters:
        - in: query
          name: project
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, enum: [active, approved, rejected, aborted] }
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RunSummary" }

  /v1/runs/{runId}:
    get:
      tags: [runs]
      summary: Get a single assembled run (events, diffs, outcome)
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Run" }
        "404": { description: not found }

  /v1/runs/{runId}/diff:
    post:
      tags: [runs]
      summary: Attach a session.diff snapshot to a run
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DiffSnapshot" }
      responses:
        "204": { description: stored }

  /v1/runs/{runId}/outcome:
    post:
      tags: [runs]
      summary: Mark final outcome of a run; triggers analyzer
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [outcome]
              properties:
                outcome: { type: string, enum: [approved, rejected, aborted] }
                feedback: { type: string, description: "Free-text rejection reason if any" }
      responses:
        "204": { description: recorded }

  /v1/runs/{runId}/feedback:
    post:
      tags: [runs]
      summary: Attach user feedback to a run (e.g. rejection reason captured by dashboard)
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [feedback]
              properties:
                feedback: { type: string }
                source: { type: string, enum: [plugin, dashboard, manual], default: manual }
      responses:
        "204": { description: stored }

  /v1/runs/{runId}/rejections:
    get:
      tags: [runs]
      summary: List rejections (filed failures) recorded on a run
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Rejection" }
        "404": { description: not found }
    post:
      tags: [runs]
      summary: |
        Record a rejection (filed failure) on a still-active run. Unlike
        /outcome, this does NOT terminate the run — the thread keeps going
        so the agent can recover from the failure.
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
                failure_mode: { type: string, nullable: true }
                symptoms: { type: string, nullable: true, description: "comma-separated symptom names" }
                ts: { type: integer, nullable: true, description: "unix ms; defaults to server time" }
                source: { type: string, enum: [plugin, dashboard, manual], default: plugin }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Rejection" }
        "404": { description: not found }

  /v1/runs/{runId}/stream:
    get:
      tags: [stream]
      summary: SSE re-broadcast of events for a single run
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema: { type: string }

  /v1/preflight:
    post:
      tags: [preflight]
      summary: Get warnings + checks for a new task before the agent codes
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PreflightRequest" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PreflightResponse" }

  /v1/graph/nodes:
    get:
      tags: [graph]
      summary: Inspect graph nodes (dashboard)
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [Run, Task, File, Component, ChangePattern, Symptom, FailureMode, FixPattern, Outcome]
        - in: query
          name: limit
          schema: { type: integer, default: 200 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/GraphNode" }

  /v1/graph/edges:
    get:
      tags: [graph]
      summary: Inspect graph edges (dashboard)
      parameters:
        - in: query
          name: source_id
          schema: { type: string }
        - in: query
          name: target_id
          schema: { type: string }
        - in: query
          name: type
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 500 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/GraphEdge" }

  /v1/graph/export:
    get:
      tags: [graph]
      summary: Download a portable knowledge bundle
      description: |
        Returns a JSON bundle of every finalized FailureCase plus its
        embeddings, suitable for hand-off to another Autopsy instance.
        Run/Task/Outcome graph nodes are deliberately not included — the
        importer re-derives them from the cases. Response carries a
        `Content-Disposition: attachment` header so a direct browser hit or
        `curl -OJ` saves the file with a meaningful name.
      parameters:
        - in: query
          name: project
          schema: { type: string }
          description: Filter to a single source project. Omit to export everything.
        - in: query
          name: source_label
          schema: { type: string }
          description: |
            Label embedded in the bundle so importers can namespace shadow
            runs (e.g. `acme-team`). Defaults to the source project name.
      responses:
        "200":
          description: knowledge bundle
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExportBundle" }

  /v1/graph/import:
    post:
      tags: [graph]
      summary: Materialize a knowledge bundle into the local graph
      description: |
        Idempotent — re-importing the same bundle is a no-op (skip-on-conflict).
        For each case the importer creates:

          - a minimal shadow row in `runs` keyed
            `imported:<source_label>:<source_run_id>`, with `project =
            imported:<source_label>` so the dashboard can filter it out;
          - a matching `failure_cases` row;
          - the FailureMode / FixPattern / Symptom / ChangePattern /
            Component graph nodes plus the Run / Task / Outcome shells the
            preflight retrieval needs (Run nodes are tagged
            `properties.imported = true`);
          - the supplied embeddings, keyed to the shadow run id.

        Returns 400 when the bundle's `embed_dim` doesn't match the local
        `EMBED_PROVIDER`, since silent dim mismatch corrupts ANN search.
      parameters:
        - in: query
          name: source_label
          schema: { type: string }
          description: Override the source label embedded in the bundle.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExportBundle" }
      responses:
        "200":
          description: imported
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportResult" }
        "400": { description: bundle malformed or incompatible }

components:
  schemas:
    EventIn:
      type: object
      required: [run_id, type, ts, properties]
      properties:
        event_id: { type: string, description: "Optional plugin-side id for dedup" }
        run_id: { type: string, description: "opencode session_id" }
        project: { type: string, nullable: true }
        worktree: { type: string, nullable: true }
        ts: { type: integer, description: "Unix ms" }
        type:
          type: string
          description: "opencode event type, e.g. session.created, tool.execute.after, permission.replied"
        properties:
          type: object
          additionalProperties: true

    RunSummary:
      type: object
      required: [run_id, started_at, status]
      properties:
        run_id: { type: string }
        project: { type: string, nullable: true }
        worktree: { type: string, nullable: true }
        started_at: { type: integer }
        ended_at: { type: integer, nullable: true }
        status: { type: string, enum: [active, approved, rejected, aborted] }
        task: { type: string, nullable: true, description: "Latest user prompt" }
        rejection_reason:
          type: string
          nullable: true
          description: "Latest rejection reason. Always present once any rejection is filed; orthogonal to status."
        rejection_count:
          type: integer
          default: 0
          description: "Number of rejections filed against this still-active or terminal run."
        files_touched: { type: integer, default: 0 }
        tool_calls: { type: integer, default: 0 }
        preflight_hit_count:
          type: integer
          default: 0
          description: "Count of /v1/preflight calls that returned non-none risk for this run."
        preflight_blocked_count:
          type: integer
          default: 0
          description: "Subset of preflight_hit_count where the call also blocked a tool execution."

    Run:
      allOf:
        - $ref: "#/components/schemas/RunSummary"
        - type: object
          properties:
            events:
              type: array
              items: { $ref: "#/components/schemas/EventIn" }
            diffs:
              type: array
              items: { $ref: "#/components/schemas/DiffSnapshot" }
            failure_case:
              $ref: "#/components/schemas/FailureCase"
              nullable: true
            rejections:
              type: array
              items: { $ref: "#/components/schemas/Rejection" }
            preflight_hits:
              type: array
              items: { $ref: "#/components/schemas/PreflightHit" }
              description: |
                Persisted record of every /v1/preflight call that returned
                non-none risk for this run. The dashboard renders one badge
                per hit on the run row + a detail panel showing the
                similar past runs and the prose injected into the agent's
                system prompt.

    Rejection:
      type: object
      required: [id, run_id, ts, reason, source]
      properties:
        id: { type: integer }
        run_id: { type: string }
        ts: { type: integer, description: "unix ms" }
        reason: { type: string }
        failure_mode: { type: string, nullable: true }
        symptoms: { type: string, nullable: true, description: "comma-separated" }
        source: { type: string, enum: [plugin, dashboard, manual] }

    DiffSnapshot:
      type: object
      required: [files]
      properties:
        captured_at: { type: integer }
        files:
          type: array
          items:
            type: object
            required: [file, status]
            properties:
              file: { type: string }
              status: { type: string, enum: [added, modified, deleted, renamed] }
              additions: { type: integer, default: 0 }
              deletions: { type: integer, default: 0 }
              patch: { type: string, description: "Unified diff" }

    FailureCase:
      type: object
      required: [run_id, failure_mode, symptoms]
      properties:
        run_id: { type: string }
        task_type: { type: string, nullable: true }
        components: { type: array, items: { type: string } }
        change_patterns: { type: array, items: { type: string } }
        symptoms:
          type: array
          items:
            type: object
            required: [name]
            properties:
              name: { type: string }
              evidence: { type: array, items: { type: string } }
              confidence: { type: number, format: float, default: 0.5 }
        failure_mode: { type: string }
        fix_pattern: { type: string, nullable: true }
        summary: { type: string, nullable: true }

    PreflightHit:
      type: object
      required: [id, run_id, ts, task, risk_level, top_failure_score]
      properties:
        id: { type: integer }
        run_id: { type: string }
        ts: { type: integer, description: "unix ms" }
        task: { type: string, description: "Task / user message that triggered the preflight call" }
        risk_level: { type: string, enum: [low, medium, high] }
        top_failure_score: { type: number, format: float }
        blocked:
          type: boolean
          default: false
          description: "True if the call originated from `tool.execute.before` AND the score exceeded PREFLIGHT_BLOCK_THRESHOLD."
        tool: { type: string, nullable: true, description: "Tool name when blocked from tool.execute.before, else null." }
        args:
          type: object
          additionalProperties: true
          nullable: true
        similar_runs:
          type: array
          items: { type: string }
          description: "Run IDs that the ANN search matched."
        top_failure_modes:
          type: array
          items:
            type: object
            required: [name, score]
            properties:
              name: { type: string }
              score: { type: number, format: float }
        top_fix_patterns:
          type: array
          items:
            type: object
            required: [name, score]
            properties:
              name: { type: string }
              score: { type: number, format: float }
        addendum:
          type: string
          nullable: true
          description: "The prose actually pushed into the agent's system prompt array (template or LLM-synthesized)."

    PreflightRequest:
      type: object
      required: [task]
      properties:
        run_id: { type: string, nullable: true }
        task: { type: string, description: "User prompt or task description" }
        project:
          type: string
          nullable: true
          description: "Scope retrieval to runs from this project (omit/null = match across all projects)"
        worktree: { type: string, nullable: true }
        tool: { type: string, nullable: true, description: "If asked from tool.execute.before" }
        args:
          type: object
          additionalProperties: true
          nullable: true

    PreflightResponse:
      type: object
      required: [risk_level]
      properties:
        risk_level: { type: string, enum: [none, low, medium, high] }
        block: { type: boolean, default: false }
        reason: { type: string, nullable: true }
        similar_runs: { type: array, items: { type: string } }
        missing_followups: { type: array, items: { type: string } }
        recommended_checks: { type: array, items: { type: string } }
        system_addendum:
          type: string
          nullable: true
          description: "Markdown to append to the system prompt"

    GraphNode:
      type: object
      required: [id, type, name]
      properties:
        id: { type: string }
        type: { type: string }
        name: { type: string }
        properties:
          type: object
          additionalProperties: true

    GraphEdge:
      type: object
      required: [id, source_id, target_id, type]
      properties:
        id: { type: string }
        source_id: { type: string }
        target_id: { type: string }
        type: { type: string }
        confidence: { type: number, format: float }
        evidence_run_id: { type: string, nullable: true }
        properties:
          type: object
          additionalProperties: true

    ExportEmbedding:
      type: object
      required: [entity_type, text, vector]
      properties:
        entity_type:
          type: string
          enum: [task, failure, fix, run_summary]
        text: { type: string }
        vector:
          type: array
          items: { type: number, format: float }
          description: "pgvector contents; length matches source's embed_dim"

    ExportSymptom:
      type: object
      required: [name]
      properties:
        name: { type: string }
        evidence: { type: array, items: { type: string } }
        confidence: { type: number, format: float, default: 0.5 }
        source: { type: string, nullable: true }

    ExportCase:
      type: object
      required: [source_run_id, failure_mode]
      properties:
        source_run_id:
          type: string
          description: "Original run_id at the source. Importer prefixes it with `imported:<source_label>:` to avoid collisions."
        started_at: { type: integer, default: 0 }
        ended_at: { type: integer, nullable: true }
        status:
          type: string
          enum: [rejected, approved, aborted]
          default: rejected
        task: { type: string, nullable: true }
        task_type: { type: string, nullable: true }
        failure_mode: { type: string }
        fix_pattern: { type: string, nullable: true }
        components: { type: array, items: { type: string } }
        change_patterns: { type: array, items: { type: string } }
        symptoms:
          type: array
          items: { $ref: "#/components/schemas/ExportSymptom" }
        summary: { type: string, nullable: true }
        embeddings:
          type: array
          items: { $ref: "#/components/schemas/ExportEmbedding" }

    ExportSource:
      type: object
      properties:
        project: { type: string, nullable: true }
        source_label: { type: string, nullable: true }
        embed_provider: { type: string, nullable: true }
        embed_dim: { type: integer, nullable: true }

    ExportBundle:
      type: object
      required: [schema_version, exported_at]
      properties:
        schema_version: { type: integer, description: "Currently 1" }
        exported_at: { type: integer, description: "Unix ms" }
        source: { $ref: "#/components/schemas/ExportSource" }
        cases:
          type: array
          items: { $ref: "#/components/schemas/ExportCase" }

    ImportResult:
      type: object
      properties:
        cases_added: { type: integer, default: 0 }
        cases_skipped: { type: integer, default: 0 }
        embeddings_added: { type: integer, default: 0 }
        embeddings_skipped: { type: integer, default: 0 }
