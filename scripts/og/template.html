<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Autopsy OG Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0b10;
  --fg:#f5f6fb;
  --muted:#9ea0b3;
  --muted-strong:#c8cdde;
  --primary:oklch(0.7 0.17 250);
  --primary-strong:oklch(0.78 0.19 250);
  --approve:oklch(0.7 0.18 145);
  --card:oklch(0.18 0.02 260 / .55);
  --border:oklch(0.3 0.02 260 / .55);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:1200px;height:630px;overflow:hidden}
body{
  font-family:'Geist','Inter',ui-sans-serif,system-ui,sans-serif;
  background:var(--bg);
  color:var(--fg);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  position:relative;
}
body::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(60% 80% at 50% 0%, oklch(0.7 0.17 250 / .35) 0%, transparent 60%),
    radial-gradient(45% 55% at 90% 100%, oklch(0.6 0.22 250 / .25) 0%, transparent 70%);
  pointer-events:none;
}
body::after{
  content:'';
  position:absolute;
  inset:0;
  background-image:radial-gradient(oklch(0.85 0 0 / .07) 1.2px, transparent 1.2px);
  background-size:36px 36px;
  mask-image:radial-gradient(ellipse at center, black 35%, transparent 78%);
  pointer-events:none;
}

.shell{
  position:relative;
  z-index:1;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:64px;
}

.eyebrow{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:8px 18px;
  border-radius:999px;
  border:1px solid var(--border);
  background:var(--card);
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:14px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--muted-strong);
  margin-bottom:32px;
}
.eyebrow .dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--approve);
  box-shadow:0 0 12px var(--approve);
}

.row{
  display:flex;
  align-items:center;
  gap:36px;
}
.mark{
  width:160px;
  height:160px;
  position:relative;
  flex-shrink:0;
}
.mark::before{
  content:'';
  position:absolute;
  inset:-22px;
  background:radial-gradient(closest-side, oklch(0.7 0.17 250 / .4), transparent 70%);
  filter:blur(16px);
}
.mark svg{
  position:relative;
  width:100%;
  height:100%;
  color:var(--fg);
  filter:drop-shadow(0 0 24px oklch(0.7 0.17 250 / .6));
}
.mark .pulse{stroke:var(--primary)}

.wordmark{
  font-size:148px;
  font-weight:800;
  letter-spacing:-0.045em;
  line-height:0.92;
  background:linear-gradient(180deg,#ffffff 0%, #b8bdce 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.tagline{
  margin-top:36px;
  font-size:32px;
  font-weight:400;
  color:var(--muted-strong);
  max-width:920px;
  letter-spacing:-0.01em;
}
.tagline em{
  color:var(--fg);
  font-style:normal;
  font-weight:600;
}

.foot{
  position:absolute;
  bottom:36px;
  left:0;
  right:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 64px;
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:18px;
  letter-spacing:.06em;
  color:var(--muted);
}
.foot .url{color:var(--primary-strong)}
</style>
</head>
<body>
<div class="shell">
  <div class="eyebrow"><span class="dot"></span>Built for opencode &amp; Devin</div>
  <div class="row">
    <div class="mark">
      <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M16 4 L5.5 27 M16 4 L26.5 27"/>
        <path class="pulse" d="M3 18 L9 18 L11 14 L13 21 L16 13 L19 21 L21 14 L23 18 L29 18" stroke-width="1.4"/>
      </svg>
    </div>
    <div class="wordmark">Autopsy</div>
  </div>
  <div class="tagline">Forensic memory for AI coding agents. Every <em>failure</em> becomes a <em>guardrail</em>.</div>
</div>
<div class="foot">
  <span class="url">autopsy.surf</span>
  <span>github.com/balebbae/Autopsy</span>
</div>
</body>
</html>
